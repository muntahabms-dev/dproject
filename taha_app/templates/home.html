{% extends 'base.html' %}

{% block title %}
Home
{% endblock %}

{% block content %}

<h2>Welcome {{ name }}</h2>

<p>Course: {{ course }}</p>

<h3>Fruit List</h3>

<ul>
{% for fruit in fruits %}
    <li>{{ fruit|upper }}</li>
{% endfor %}
</ul>

{% if fruits %}
<p>Total Fruits: {{ fruits|length }}</p>
{% endif %}

{% endblock %}
